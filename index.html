<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, user-scalable=no"
    />
    <title>The Zenbook — My notebook</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Courier+Prime:ital,wght@0,400;0,700;1,400&family=Lora:ital,wght@0,400;0,500;1,400&display=swap"
      rel="stylesheet"
    />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
    <style>
      :root {
        --bg: #f5f0e8;
        --bg2: #ede7d9;
        --bg3: #e2d9c8;
        --paper: #faf7f2;
        --ink: #2c1810;
        --ink2: #5c3d2e;
        --ink3: #8b6348;
        --accent: #8b2e2e;
        --accent2: #c4793a;
        --border: #c9b99a;
        --border2: #a89070;
        --sidebar-w: 260px;
        --toolbar-h: 44px;
        --tag-bg: #e8ddd0;
      }
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Lora", Georgia, serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #topbar {
        height: 48px;
        background: var(--ink);
        display: flex;
        align-items: center;
        padding: 0 16px;
        gap: 12px;
        flex-shrink: 0;
        border-bottom: 2px solid var(--accent);
      }
      #topbar .logo {
        font-family: "Playfair Display", serif;
        font-size: 18px;
        color: var(--bg);
        letter-spacing: 0.04em;
        flex: 1;
      }
      #topbar .logo span {
        color: var(--accent2);
        font-style: italic;
      }
      #search-wrap {
        display: flex;
        align-items: center;
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 4px;
        padding: 0 10px;
        gap: 6px;
      }
      #search {
        background: none;
        border: none;
        outline: none;
        color: var(--bg);
        font-family: "Courier Prime", monospace;
        font-size: 13px;
        width: 180px;
        padding: 6px 0;
      }
      #search::placeholder {
        color: rgba(245, 240, 232, 0.4);
      }
      .topbtn {
        background: none;
        border: 1px solid rgba(255, 255, 255, 0.2);
        color: var(--bg);
        border-radius: 4px;
        padding: 5px 12px;
        font-family: "Courier Prime", monospace;
        font-size: 12px;
        cursor: pointer;
        letter-spacing: 0.05em;
        transition: all 0.15s;
      }
      .topbtn:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--accent2);
      }
      .topbtn.on {
        background: var(--accent2);
        border-color: var(--accent2);
        color: #fff;
      }

      #main {
        display: flex;
        flex: 1;
        overflow: hidden;
      }

      /* SIDEBAR */
      #sidebar {
        width: var(--sidebar-w);
        background: var(--bg2);
        border-right: 1px solid var(--border);
        display: flex;
        flex-direction: column;
        overflow: hidden;
        flex-shrink: 0;
      }
      #notebooks-header {
        padding: 12px 14px 8px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #notebooks-header h3 {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        color: var(--ink3);
        text-transform: uppercase;
      }
      .icon-btn {
        width: 22px;
        height: 22px;
        border: 1px solid var(--border2);
        background: none;
        border-radius: 3px;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--ink2);
        font-size: 14px;
        transition: all 0.15s;
      }
      .icon-btn:hover {
        background: var(--bg3);
        color: var(--accent);
        border-color: var(--accent);
      }
      #notebooks-list {
        overflow-y: auto;
        padding: 6px 0;
      }
      .notebook-item {
        padding: 8px 14px;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 8px;
        border-left: 3px solid transparent;
        transition: all 0.12s;
        font-size: 13px;
        color: var(--ink2);
      }
      .notebook-item:hover {
        background: var(--bg3);
        color: var(--ink);
      }
      .notebook-item.active {
        border-left-color: var(--accent);
        background: var(--paper);
        color: var(--ink);
        font-weight: 600;
      }
      .nb-count {
        margin-left: auto;
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        color: var(--ink3);
        background: var(--bg3);
        padding: 1px 6px;
        border-radius: 8px;
      }
      .nb-del-btn {
        background: none;
        border: none;
        cursor: pointer;
        color: var(--ink3);
        font-size: 13px;
        padding: 0 2px;
        display: none;
        margin-left: 4px;
      }
      .notebook-item:hover .nb-del-btn {
        display: block;
      }
      .nb-del-btn:hover {
        color: var(--accent);
      }
      #sidebar-divider {
        border: none;
        border-top: 1px solid var(--border);
        margin: 6px 0;
      }
      #notes-list-header {
        padding: 8px 14px 4px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      #notes-list-header h3 {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        letter-spacing: 0.12em;
        color: var(--ink3);
        text-transform: uppercase;
      }
      #notes-list {
        overflow-y: auto;
        flex: 1;
        padding-bottom: 8px;
      }
      .note-item {
        padding: 9px 14px;
        cursor: pointer;
        border-bottom: 1px solid rgba(201, 185, 154, 0.3);
        transition: background 0.1s;
      }
      .note-item:hover {
        background: var(--bg3);
      }
      .note-item.active {
        background: var(--paper);
        border-left: 3px solid var(--accent2);
      }
      .note-title-s {
        font-family: "Lora", serif;
        font-size: 13px;
        font-weight: 500;
        color: var(--ink);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .note-meta-s {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        color: var(--ink3);
        margin-top: 2px;
      }
      .note-preview-s {
        font-size: 11px;
        color: var(--ink3);
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        font-style: italic;
      }
      .note-tags-s {
        margin-top: 4px;
        display: flex;
        gap: 4px;
        flex-wrap: wrap;
      }
      .tag-pill {
        background: var(--tag-bg);
        border: 1px solid var(--border);
        color: var(--ink2);
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        padding: 1px 6px;
        border-radius: 10px;
      }

      /* EDITOR */
      #editor-panel {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        background: var(--paper);
      }
      #toolbar {
        height: var(--toolbar-h);
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 10px;
        gap: 3px;
        flex-shrink: 0;
        overflow-x: auto;
      }
      .tb-sep {
        width: 1px;
        height: 20px;
        background: var(--border);
        margin: 0 3px;
        flex-shrink: 0;
      }
      .tb-btn {
        border: none;
        background: none;
        color: var(--ink2);
        cursor: pointer;
        border-radius: 3px;
        padding: 4px 7px;
        font-size: 13px;
        font-family: "Courier Prime", monospace;
        transition: all 0.12s;
        min-width: 26px;
        text-align: center;
        flex-shrink: 0;
      }
      .tb-btn:hover {
        background: var(--bg3);
        color: var(--accent);
      }
      #view-toggle {
        margin-left: auto;
        display: flex;
        background: var(--bg3);
        border-radius: 4px;
        padding: 2px;
        gap: 2px;
        flex-shrink: 0;
      }
      .vt-btn {
        border: none;
        background: none;
        cursor: pointer;
        padding: 3px 9px;
        border-radius: 3px;
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        color: var(--ink3);
        transition: all 0.12s;
      }
      .vt-btn.active {
        background: var(--paper);
        color: var(--ink);
      }

      #note-title-wrap {
        padding: 16px 26px 10px;
        border-bottom: 1px dashed var(--border);
        flex-shrink: 0;
      }
      #note-title {
        font-family: "Playfair Display", serif;
        font-size: 26px;
        color: var(--ink);
        border: none;
        background: transparent;
        outline: none;
        width: 100%;
        font-weight: 600;
      }
      #note-title::placeholder {
        color: var(--border2);
        font-style: italic;
      }
      #tags-wrap {
        display: flex;
        align-items: center;
        gap: 6px;
        margin-top: 8px;
        flex-wrap: wrap;
      }
      .tag-pill-e {
        background: var(--tag-bg);
        border: 1px solid var(--border);
        color: var(--ink2);
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        padding: 2px 8px;
        border-radius: 10px;
        display: flex;
        align-items: center;
        gap: 4px;
      }
      .tag-rm {
        cursor: pointer;
        color: var(--ink3);
        font-size: 11px;
      }
      .tag-rm:hover {
        color: var(--accent);
      }
      #tag-input {
        border: none;
        background: transparent;
        outline: none;
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        color: var(--ink2);
        min-width: 80px;
      }
      #tag-input::placeholder {
        color: var(--border2);
      }
      #note-date {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        color: var(--ink3);
        margin-top: 6px;
      }

      #editor-wrap {
        flex: 1;
        overflow: hidden;
        display: flex;
        position: relative;
      }
      #editor {
        flex: 1;
        border: none;
        background: var(--paper);
        outline: none;
        resize: none;
        padding: 20px 26px;
        font-family: "Courier Prime", monospace;
        font-size: 15px;
        line-height: 1.9;
        color: var(--ink);
        overflow-y: auto;
      }
      #preview {
        flex: 1;
        overflow-y: auto;
        padding: 20px 26px;
        display: none;
        font-family: "Lora", Georgia, serif;
        font-size: 15px;
        line-height: 1.8;
        color: var(--ink);
      }
      #preview h1,
      #preview h2,
      #preview h3 {
        font-family: "Playfair Display", serif;
        color: var(--ink);
        margin: 1.2em 0 0.4em;
      }
      #preview h1 {
        font-size: 22px;
        border-bottom: 1px dashed var(--border);
        padding-bottom: 6px;
      }
      #preview h2 {
        font-size: 18px;
      }
      #preview h3 {
        font-size: 15px;
      }
      #preview p {
        margin: 0.7em 0;
      }
      #preview blockquote {
        border-left: 3px solid var(--accent2);
        margin: 1em 0;
        padding: 4px 16px;
        color: var(--ink2);
        font-style: italic;
        background: var(--bg2);
        border-radius: 0 4px 4px 0;
      }
      #preview code {
        font-family: "Courier Prime", monospace;
        background: var(--bg2);
        padding: 1px 5px;
        border-radius: 3px;
        font-size: 13px;
        color: var(--accent);
      }
      #preview pre {
        background: var(--ink);
        color: var(--bg);
        padding: 14px 18px;
        border-radius: 4px;
        overflow-x: auto;
        margin: 1em 0;
      }
      #preview pre code {
        background: none;
        color: var(--bg);
        padding: 0;
      }
      #preview ul,
      #preview ol {
        padding-left: 1.5em;
        margin: 0.5em 0;
      }
      #preview li {
        margin: 0.25em 0;
      }
      #preview a {
        color: var(--accent);
      }
      #preview hr {
        border: none;
        border-top: 1px dashed var(--border);
        margin: 1.5em 0;
      }
      #preview table {
        border-collapse: collapse;
        width: 100%;
        margin: 1em 0;
        font-size: 13px;
      }
      #preview th,
      #preview td {
        border: 1px solid var(--border);
        padding: 6px 10px;
      }
      #preview th {
        background: var(--bg2);
        font-family: "Courier Prime", monospace;
        font-size: 11px;
      }
      #preview img {
        max-width: 100%;
        border: 1px dashed var(--border);
        border-radius: 4px;
        margin: 10px 0;
        display: block;
      }
      #split-mode #editor,
      #split-mode #preview {
        flex: 1;
        display: block;
      }
      #split-mode #editor {
        border-right: 1px solid var(--border);
      }

      #md-help {
        position: absolute;
        bottom: 50px;
        right: 20px;
        background: var(--ink);
        color: var(--bg);
        border-radius: 6px;
        padding: 14px 18px;
        font-family: "Courier Prime", monospace;
        font-size: 12px;
        line-height: 2;
        display: none;
        z-index: 10;
        min-width: 200px;
      }
      #md-help.open {
        display: block;
      }
      #md-help .mh-title {
        font-size: 10px;
        letter-spacing: 0.1em;
        color: var(--accent2);
        margin-bottom: 6px;
        text-transform: uppercase;
      }
      #md-help code {
        color: var(--accent2);
      }

      /* DRAW PANEL */
      #draw-panel {
        position: absolute;
        inset: 0;
        background: var(--paper);
        display: none;
        flex-direction: column;
        z-index: 20;
      }
      #draw-panel.open {
        display: flex;
      }
      #draw-toolbar {
        background: var(--bg2);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 7px;
        flex-shrink: 0;
        flex-wrap: wrap;
        min-height: 52px;
        padding-top: 6px;
        padding-bottom: 6px;
      }
      .dtb-sep {
        width: 1px;
        height: 24px;
        background: var(--border);
        flex-shrink: 0;
      }
      .dtool {
        border: 1px solid var(--border);
        background: none;
        border-radius: 5px;
        cursor: pointer;
        padding: 5px 11px;
        font-family: "Courier Prime", monospace;
        font-size: 12px;
        color: var(--ink2);
        transition: all 0.12s;
        display: flex;
        align-items: center;
        gap: 5px;
        white-space: nowrap;
      }
      .dtool:hover {
        background: var(--bg3);
        color: var(--accent);
      }
      .dtool.active {
        background: var(--ink);
        color: var(--bg);
        border-color: var(--ink);
      }
      #swatches {
        display: flex;
        gap: 5px;
        align-items: center;
      }
      .sw {
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid transparent;
        cursor: pointer;
        transition: transform 0.1s;
        flex-shrink: 0;
      }
      .sw:hover {
        transform: scale(1.2);
      }
      .sw.active {
        border-color: var(--ink);
      }
      #custom-color-wrap {
        position: relative;
        width: 20px;
        height: 20px;
        border-radius: 50%;
        border: 2px solid var(--border2);
        overflow: hidden;
        cursor: pointer;
        flex-shrink: 0;
      }
      #color-picker {
        position: absolute;
        inset: -4px;
        opacity: 1;
        width: 28px;
        height: 28px;
        border: none;
        outline: none;
        cursor: pointer;
        padding: 0;
      }
      #size-wrap,
      #op-wrap {
        display: flex;
        align-items: center;
        gap: 5px;
      }
      #size-wrap label,
      #op-wrap label {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        color: var(--ink3);
        text-transform: uppercase;
        letter-spacing: 0.06em;
        white-space: nowrap;
      }
      #brush-size,
      #brush-op {
        width: 65px;
        accent-color: var(--accent2);
      }
      #size-dot {
        background: var(--ink);
        border-radius: 50%;
      }
      #op-val {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        color: var(--ink3);
        min-width: 28px;
      }
      #canvas-wrap {
        flex: 1;
        overflow: auto;
        position: relative;
        background: #e8e0d4;
      }
      #canvas-wrap.cur-pen {
        cursor: crosshair;
      }
      #canvas-wrap.cur-hl {
        cursor: cell;
      }
      #canvas-wrap.cur-er {
        cursor: no-drop;
      }
      #draw-canvas {
        display: block;
        touch-action: none;
        background: #faf7f2;
        background-image: repeating-linear-gradient(
          to bottom,
          transparent,
          transparent 31px,
          rgba(201, 185, 154, 0.3) 31px,
          rgba(201, 185, 154, 0.3) 32px
        );
      }
      #draw-footer {
        height: 38px;
        background: var(--bg2);
        border-top: 1px solid var(--border);
        display: flex;
        align-items: center;
        padding: 0 12px;
        gap: 8px;
        flex-shrink: 0;
      }
      #draw-footer button {
        border: 1px solid var(--border);
        background: none;
        border-radius: 3px;
        padding: 3px 11px;
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        color: var(--ink2);
        cursor: pointer;
        transition: all 0.12s;
        letter-spacing: 0.04em;
      }
      #draw-footer button:hover {
        background: var(--bg3);
        color: var(--accent);
      }
      #draw-footer .btn-ins {
        background: var(--accent);
        color: #fff;
        border-color: var(--accent);
      }
      #draw-footer .btn-ins:hover {
        background: var(--accent2);
        border-color: var(--accent2);
      }
      #undo-ct {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        color: var(--ink3);
      }
      #draw-footer .spacer {
        flex: 1;
      }
      #draw-footer select {
        font-family: "Courier Prime", monospace;
        font-size: 11px;
        border: 1px solid var(--border);
        background: var(--bg);
        color: var(--ink2);
        padding: 3px 5px;
        border-radius: 3px;
        cursor: pointer;
      }

      /* Empty state */
      #empty-state {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: var(--ink3);
      }
      #empty-state .es-t {
        font-family: "Playfair Display", serif;
        font-size: 20px;
        font-style: italic;
        color: var(--ink2);
      }
      #empty-state .es-s {
        font-family: "Courier Prime", monospace;
        font-size: 12px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .nnbtn {
        margin-top: 8px;
        background: var(--accent);
        color: var(--bg);
        border: none;
        font-family: "Courier Prime", monospace;
        font-size: 12px;
        letter-spacing: 0.08em;
        padding: 8px 20px;
        border-radius: 4px;
        cursor: pointer;
        text-transform: uppercase;
        transition: all 0.15s;
      }
      .nnbtn:hover {
        background: var(--accent2);
      }

      #statusbar {
        height: 26px;
        background: var(--ink);
        border-top: 1px solid var(--border2);
        display: flex;
        align-items: center;
        padding: 0 14px;
        gap: 16px;
        flex-shrink: 0;
      }
      .si {
        font-family: "Courier Prime", monospace;
        font-size: 10px;
        color: rgba(245, 240, 232, 0.45);
        letter-spacing: 0.06em;
      }
      #save-st {
        color: rgba(196, 121, 58, 0.7);
      }
      #save-st.ok {
        color: rgba(120, 180, 100, 0.7);
      }

      .modal-ov {
        position: fixed;
        inset: 0;
        background: rgba(44, 24, 16, 0.6);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal-ov.open {
        display: flex;
      }
      .modal {
        background: var(--paper);
        border: 1px solid var(--border2);
        border-radius: 6px;
        padding: 24px 28px;
        min-width: 300px;
        box-shadow: 4px 4px 0 var(--border2);
      }
      .modal h2 {
        font-family: "Playfair Display", serif;
        font-size: 18px;
        margin-bottom: 14px;
        color: var(--ink);
      }
      .modal input {
        width: 100%;
        border: 1px solid var(--border);
        background: var(--bg);
        border-radius: 4px;
        padding: 8px 12px;
        font-family: "Courier Prime", monospace;
        font-size: 14px;
        color: var(--ink);
        outline: none;
        margin-bottom: 14px;
      }
      .modal input:focus {
        border-color: var(--accent2);
      }
      .modal-btns {
        display: flex;
        gap: 8px;
        justify-content: flex-end;
      }
      .modal-btns button {
        font-family: "Courier Prime", monospace;
        font-size: 12px;
        padding: 7px 16px;
        border-radius: 4px;
        cursor: pointer;
        border: 1px solid var(--border);
        background: none;
        color: var(--ink2);
      }
      .modal-btns .bp {
        background: var(--accent);
        color: var(--bg);
        border-color: var(--accent);
      }
      .modal-btns button:hover {
        opacity: 0.8;
      }

      ::-webkit-scrollbar {
        width: 5px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--border);
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="topbar">
      <div class="logo">The <span>Zenbook</span></div>
      <div id="search-wrap">
        <svg width="13" height="13" viewBox="0 0 16 16" fill="none">
          <circle cx="6.5" cy="6.5" r="5" stroke="#f5f0e8" stroke-width="1.5" />
          <path
            d="M10.5 10.5L14 14"
            stroke="#f5f0e8"
            stroke-width="1.5"
            stroke-linecap="round"
          />
        </svg>
        <input
          type="text"
          id="search"
          placeholder="Search notes…"
          autocomplete="off"
        />
      </div>
      <button class="topbtn" id="draw-btn" onclick="toggleDraw()">
        ✏ Draw
      </button>
      <button class="topbtn" onclick="newNote()">+ New Note</button>
    </div>

    <div id="main">
      <div id="sidebar">
        <div id="notebooks-header">
          <h3>Notebooks</h3>
          <button class="icon-btn" onclick="openNBModal()">+</button>
        </div>
        <div id="notebooks-list"></div>
        <hr id="sidebar-divider" />
        <div id="notes-list-header">
          <h3 id="notes-lbl">Notes</h3>
          <button class="icon-btn" onclick="newNote()">+</button>
        </div>
        <div id="notes-list"></div>
      </div>

      <div id="editor-panel">
        <div id="toolbar">
          <button class="tb-btn" onclick="fmt('bold')">
            <b style="font-family: 'Playfair Display', serif">B</b>
          </button>
          <button class="tb-btn" onclick="fmt('italic')"><i>I</i></button>
          <button
            class="tb-btn"
            onclick="fmtMd('~~','~~')"
            style="text-decoration: line-through"
          >
            S
          </button>
          <div class="tb-sep"></div>
          <button
            class="tb-btn"
            onclick="fmtLine('# ')"
            style="
              font-family: 'Playfair Display', serif;
              font-weight: 600;
              font-size: 12px;
            "
          >
            H1
          </button>
          <button
            class="tb-btn"
            onclick="fmtLine('## ')"
            style="font-family: 'Playfair Display', serif; font-size: 12px"
          >
            H2
          </button>
          <button
            class="tb-btn"
            onclick="fmtLine('### ')"
            style="font-family: 'Playfair Display', serif; font-size: 11px"
          >
            H3
          </button>
          <div class="tb-sep"></div>
          <button class="tb-btn" onclick="fmtLine('- ')">•</button>
          <button class="tb-btn" onclick="fmtLine('1. ')">1.</button>
          <button class="tb-btn" onclick="fmtLine('> ')">"</button>
          <button
            class="tb-btn"
            onclick="fmtMd('`','`')"
            style="font-family: 'Courier Prime', monospace"
          >
            `c`
          </button>
          <button class="tb-btn" onclick="insertLink()">🔗</button>
          <button class="tb-btn" onclick="insertHr()">—</button>
          <button
            class="tb-btn"
            onclick="toggleMdHelp()"
            style="font-size: 11px"
          >
            MD?
          </button>
          <div id="view-toggle">
            <button
              class="vt-btn active"
              onclick="setView('edit')"
              id="vt-edit"
            >
              Edit
            </button>
            <button class="vt-btn" onclick="setView('split')" id="vt-split">
              Split
            </button>
            <button class="vt-btn" onclick="setView('preview')" id="vt-prev">
              Preview
            </button>
          </div>
        </div>

        <div id="empty-state">
          <div class="es-t">— Nothing selected —</div>
          <div class="es-s">Choose a note or create a new one</div>
          <button class="nnbtn" onclick="newNote()">+ New Note</button>
        </div>

        <div
          id="note-area"
          style="
            display: none;
            flex: 1;
            flex-direction: column;
            overflow: hidden;
            position: relative;
          "
        >
          <div id="note-title-wrap">
            <input
              type="text"
              id="note-title"
              placeholder="Untitled entry…"
              oninput="onTitleInput()"
            />
            <div id="tags-wrap">
              <span id="tags-disp"></span>
              <input
                type="text"
                id="tag-input"
                placeholder="+ add tag, press Enter"
                maxlength="30"
              />
            </div>
            <div id="note-date"></div>
          </div>

          <div id="editor-wrap">
            <textarea
              id="editor"
              placeholder="Begin writing… Markdown supported&#10;&#10;# Heading  **bold**  *italic*  `code`&#10;- bullet   > quote"
              oninput="onEditorInput()"
              spellcheck="true"
            ></textarea>
            <div id="preview"></div>
            <div id="md-help">
              <div class="mh-title">Markdown Quick Ref</div>
              <code># Heading 1</code><br /><code>## Heading 2</code><br />
              <code>**bold**</code><br /><code>*italic*</code><br />
              <code>~~strike~~</code><br /><code>`code`</code><br />
              <code>- list item</code><br /><code>1. ordered</code><br />
              <code>> blockquote</code><br /><code>[text](url)</code><br />
              <code>--- (divider)</code>
            </div>
          </div>

          <!-- ══ DRAW PANEL ══ -->
          <div id="draw-panel">
            <div id="draw-toolbar">
              <!-- Tools -->
              <button class="dtool active" id="dt-pen" onclick="setTool('pen')">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                >
                  <path d="M12 20h9" />
                  <path
                    d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"
                  /></svg
                >Pen
              </button>
              <button class="dtool" id="dt-hl" onclick="setTool('hl')">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                >
                  <path d="M9 11l-6 6v3h3l6-6" />
                  <path d="M22 2L15 9l-4-4 7-7z" /></svg
                >Highlight
              </button>
              <button class="dtool" id="dt-er" onclick="setTool('er')">
                <svg
                  width="13"
                  height="13"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                >
                  <path d="M20 20H7L3 16l10-10 7 7-3.5 3.5" />
                  <path d="M6 11l7 7" /></svg
                >Eraser
              </button>

              <div class="dtb-sep"></div>

              <!-- Colors -->
              <div id="swatches">
                <div
                  class="sw active"
                  style="background: #2c1810"
                  data-c="#2c1810"
                  onclick="pickSw(this)"
                ></div>
                <div
                  class="sw"
                  style="background: #8b2e2e"
                  data-c="#8b2e2e"
                  onclick="pickSw(this)"
                ></div>
                <div
                  class="sw"
                  style="background: #1a4a7a"
                  data-c="#1a4a7a"
                  onclick="pickSw(this)"
                ></div>
                <div
                  class="sw"
                  style="background: #2a6040"
                  data-c="#2a6040"
                  onclick="pickSw(this)"
                ></div>
                <div
                  class="sw"
                  style="background: #c4793a"
                  data-c="#c4793a"
                  onclick="pickSw(this)"
                ></div>
                <div
                  class="sw"
                  style="background: #6b4c8f"
                  data-c="#6b4c8f"
                  onclick="pickSw(this)"
                ></div>
                <div
                  class="sw"
                  style="background: #888"
                  data-c="#888888"
                  onclick="pickSw(this)"
                ></div>
                <div
                  class="sw"
                  style="background: #fff; border-color: #ccc !important"
                  data-c="#ffffff"
                  onclick="pickSw(this)"
                ></div>
                <div id="custom-color-wrap" title="Custom color">
                  <input
                    type="color"
                    id="color-picker"
                    value="#2c1810"
                    oninput="pickCustom(this.value)"
                  />
                </div>
              </div>

              <div class="dtb-sep"></div>

              <!-- Size -->
              <div id="size-wrap">
                <label>Size</label>
                <input
                  type="range"
                  id="brush-size"
                  min="1"
                  max="40"
                  value="3"
                  step="1"
                  oninput="onSz()"
                />
                <div id="size-dot" style="width: 3px; height: 3px"></div>
              </div>

              <div class="dtb-sep"></div>

              <!-- Opacity -->
              <div id="op-wrap">
                <label>Opacity</label>
                <input
                  type="range"
                  id="brush-op"
                  min="5"
                  max="100"
                  value="100"
                  step="1"
                  oninput="onOp()"
                />
                <span id="op-val">100%</span>
              </div>
            </div>

            <div id="canvas-wrap" class="cur-pen">
              <canvas id="draw-canvas"></canvas>
            </div>

            <div id="draw-footer">
              <button onclick="undoDraw()">↩ Undo</button>
              <span id="undo-ct"></span>
              <button onclick="redoDraw()">↪ Redo</button>
              <button onclick="clearCanvas()">⊘ Clear</button>
              <button onclick="dlDraw()">⬇ PNG</button>
              <select id="canvas-sz" onchange="resizeCv()">
                <option value="800,520">Standard (800×520)</option>
                <option value="1200,700">Wide (1200×700)</option>
                <option value="600,900">Portrait (600×900)</option>
                <option value="1600,900">Large (1600×900)</option>
              </select>
              <div class="spacer"></div>
              <button class="btn-ins" onclick="insertDrawing()">
                ✓ Insert into Note
              </button>
              <button onclick="toggleDraw()">✕ Close</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="statusbar">
      <span class="si" id="wc">0 words</span>
      <span class="si" id="cc">0 chars</span>
      <span class="si" id="save-st">—</span>
      <span class="si" style="margin-left: auto" id="nb-st"></span>
    </div>

    <div class="modal-ov" id="nb-modal">
      <div class="modal">
        <h2>New Notebook</h2>
        <input
          type="text"
          id="nb-inp"
          placeholder="Notebook name…"
          maxlength="40"
        />
        <div class="modal-btns">
          <button onclick="closeNBModal()">Cancel</button>
          <button class="bp" onclick="createNB()">Create</button>
        </div>
      </div>
    </div>

    <script>
      // ── STATE ──
      const SKEY = "commonplace_v2";
      let S = { notebooks: [], notes: [], aNB: null, aN: null };
      let svTimer = null,
        curView = "edit",
        drawOpen = false;

      function load() {
        try {
          const r = localStorage.getItem(SKEY);
          if (r) S = JSON.parse(r);
          if (!S.notebooks || !S.notebooks.length) {
            S.notebooks = [
              { id: uid(), name: "Journal", icon: "📔" },
              { id: uid(), name: "Ideas", icon: "💡" },
              { id: uid(), name: "Research", icon: "🔬" },
            ];
            S.notes = [];
            S.aNB = S.notebooks[0].id;
          }
        } catch (e) {}
      }
      function sv() {
        localStorage.setItem(SKEY, JSON.stringify(S));
      }
      function uid() {
        return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
      }

      // ── RENDER ──
      function render() {
        rNBs();
        rNotes();
        rEditor();
      }

      function rNBs() {
        const l = document.getElementById("notebooks-list");
        l.innerHTML = "";
        S.notebooks.forEach((nb) => {
          const cnt = S.notes.filter((n) => n.nbId === nb.id).length;
          const el = document.createElement("div");
          el.className = "notebook-item" + (nb.id === S.aNB ? " active" : "");
          el.innerHTML = `<span>${nb.icon || "📔"}</span><span>${x(
            nb.name
          )}</span><span class="nb-count">${cnt}</span><button class="nb-del-btn" onclick="delNB('${
            nb.id
          }',event)">×</button>`;
          el.addEventListener("click", (e) => {
            if (!e.target.classList.contains("nb-del-btn")) selNB(nb.id);
          });
          l.appendChild(el);
        });
        document.getElementById("nb-st").textContent =
          (S.notebooks.find((n) => n.id === S.aNB) || {}).name || "";
      }

      function rNotes() {
        const q = document.getElementById("search").value.trim().toLowerCase();
        let ns = q
          ? S.notes.filter(
              (n) =>
                (n.title || "").toLowerCase().includes(q) ||
                (n.body || "").toLowerCase().includes(q) ||
                (n.tags || []).some((t) => t.toLowerCase().includes(q))
            )
          : S.notes.filter((n) => n.nbId === S.aNB);
        document.getElementById("notes-lbl").textContent = q
          ? `Results (${ns.length})`
          : "Notes";
        ns = ns.sort((a, b) => (b.upd || 0) - (a.upd || 0));
        const l = document.getElementById("notes-list");
        l.innerHTML = "";
        ns.forEach((note) => {
          const el = document.createElement("div");
          el.className = "note-item" + (note.id === S.aN ? " active" : "");
          const d = new Date(note.upd || note.cre || Date.now());
          const ds = d.toLocaleDateString("en-GB", {
            day: "2-digit",
            month: "short",
            year: "2-digit",
          });
          const pv = (note.body || "")
            .replace(/[#*`>_~\[\]!]/g, "")
            .replace(/\n/g, " ")
            .slice(0, 60);
          const tg = (note.tags || [])
            .map((t) => `<span class="tag-pill">${x(t)}</span>`)
            .join("");
          el.innerHTML = `<div class="note-title-s">${
            x(note.title) || '<em style="color:var(--ink3)">Untitled</em>'
          }</div><div class="note-meta-s">${ds}</div>${
            pv ? `<div class="note-preview-s">${x(pv)}…</div>` : ""
          } ${tg ? `<div class="note-tags-s">${tg}</div>` : ""}`;
          el.addEventListener("click", () => selNote(note.id));
          l.appendChild(el);
        });
      }

      function rEditor() {
        const note = S.notes.find((n) => n.id === S.aN);
        document.getElementById("empty-state").style.display = note
          ? "none"
          : "flex";
        document.getElementById("note-area").style.display = note
          ? "flex"
          : "none";
        if (!note) return;
        document.getElementById("note-title").value = note.title || "";
        document.getElementById("editor").value = note.body || "";
        rTags(note.tags || []);
        const d = new Date(note.upd || note.cre || Date.now());
        document.getElementById("note-date").textContent =
          "Last edited: " +
          d.toLocaleString("en-GB", {
            day: "2-digit",
            month: "long",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          });
        updPrev();
        updCounts();
      }

      function rTags(tags) {
        document.getElementById("tags-disp").innerHTML = tags
          .map(
            (t) =>
              `<span class="tag-pill-e">${x(
                t
              )}<span class="tag-rm" onclick="rmTag('${x(t)}')">×</span></span>`
          )
          .join("");
      }

      // ── ACTIONS ──
      function selNB(id) {
        S.aNB = id;
        S.aN = null;
        sv();
        render();
      }
      function selNote(id) {
        S.aN = id;
        sv();
        rNotes();
        rEditor();
      }

      function newNote() {
        if (!S.aNB && S.notebooks.length) S.aNB = S.notebooks[0].id;
        if (!S.aNB) {
          openNBModal();
          return;
        }
        const note = {
          id: uid(),
          nbId: S.aNB,
          title: "",
          body: "",
          tags: [],
          cre: Date.now(),
          upd: Date.now(),
        };
        S.notes.unshift(note);
        S.aN = note.id;
        sv();
        render();
        setTimeout(() => document.getElementById("note-title").focus(), 50);
      }

      function onTitleInput() {
        const n = S.notes.find((n) => n.id === S.aN);
        if (!n) return;
        n.title = document.getElementById("note-title").value;
        n.upd = Date.now();
        scheduleSv();
        rNotes();
      }
      function onEditorInput() {
        const n = S.notes.find((n) => n.id === S.aN);
        if (!n) return;
        n.body = document.getElementById("editor").value;
        n.upd = Date.now();
        updPrev();
        updCounts();
        scheduleSv();
        rNotes();
      }
      function scheduleSv() {
        const s = document.getElementById("save-st");
        s.textContent = "Unsaved…";
        s.className = "si";
        if (svTimer) clearTimeout(svTimer);
        svTimer = setTimeout(() => {
          sv();
          s.textContent = "✓ Saved";
          s.className = "si ok";
          setTimeout(() => {
            s.textContent = "—";
            s.className = "si";
          }, 2000);
        }, 800);
      }
      function updPrev() {
        if (typeof marked === "undefined") return;
        document.getElementById("preview").innerHTML = marked.parse(
          document.getElementById("editor").value
        );
      }
      function updCounts() {
        const t = document.getElementById("editor").value,
          w = t.trim() ? t.trim().split(/\s+/).length : 0;
        document.getElementById("wc").textContent =
          w + " word" + (w !== 1 ? "s" : "");
        document.getElementById("cc").textContent = t.length + " chars";
      }

      // TAGS
      document
        .getElementById("tag-input")
        .addEventListener("keydown", function (e) {
          if (e.key === "Enter" || e.key === ",") {
            e.preventDefault();
            const v = this.value.trim().replace(/,/g, "");
            if (!v) return;
            const n = S.notes.find((n) => n.id === S.aN);
            if (!n) return;
            if (!n.tags) n.tags = [];
            if (!n.tags.includes(v)) {
              n.tags.push(v);
              n.upd = Date.now();
              scheduleSv();
              rTags(n.tags);
              rNotes();
            }
            this.value = "";
          }
          if (e.key === "Backspace" && this.value === "") {
            const n = S.notes.find((n) => n.id === S.aN);
            if (n && n.tags && n.tags.length) {
              n.tags.pop();
              scheduleSv();
              rTags(n.tags);
              rNotes();
            }
          }
        });
      function rmTag(tag) {
        const n = S.notes.find((n) => n.id === S.aN);
        if (!n) return;
        n.tags = (n.tags || []).filter((t) => t !== tag);
        n.upd = Date.now();
        scheduleSv();
        rTags(n.tags);
        rNotes();
      }

      // NOTEBOOKS
      function openNBModal() {
        document.getElementById("nb-modal").classList.add("open");
        document.getElementById("nb-inp").value = "";
        setTimeout(() => document.getElementById("nb-inp").focus(), 50);
      }
      function closeNBModal() {
        document.getElementById("nb-modal").classList.remove("open");
      }
      function createNB() {
        const name = document.getElementById("nb-inp").value.trim();
        if (!name) return;
        const icons = [
          "📔",
          "📓",
          "📒",
          "📕",
          "📗",
          "📘",
          "📙",
          "🗒️",
          "📑",
          "🗃️",
        ];
        const nb = {
          id: uid(),
          name,
          icon: icons[Math.floor(Math.random() * icons.length)],
        };
        S.notebooks.push(nb);
        S.aNB = nb.id;
        S.aN = null;
        sv();
        closeNBModal();
        render();
      }
      document.getElementById("nb-inp").addEventListener("keydown", (e) => {
        if (e.key === "Enter") createNB();
      });
      document.getElementById("nb-modal").addEventListener("click", (e) => {
        if (e.target === e.currentTarget) closeNBModal();
      });
      function delNB(id, e) {
        e.stopPropagation();
        if (S.notebooks.length <= 1) {
          alert("Keep at least one notebook.");
          return;
        }
        if (!confirm("Delete this notebook and all its notes?")) return;
        S.notebooks = S.notebooks.filter((n) => n.id !== id);
        S.notes = S.notes.filter((n) => n.nbId !== id);
        if (S.aNB === id) {
          S.aNB = S.notebooks[0]?.id || null;
          S.aN = null;
        }
        sv();
        render();
      }

      document
        .getElementById("search")
        .addEventListener("input", () => rNotes());

      // VIEW
      function setView(m) {
        curView = m;
        const wr = document.getElementById("editor-wrap"),
          ed = document.getElementById("editor"),
          pv = document.getElementById("preview");
        ["vt-edit", "vt-split", "vt-prev"].forEach((id) =>
          document.getElementById(id).classList.remove("active")
        );
        wr.id = "editor-wrap";
        ed.style.display = "";
        pv.style.display = "";
        if (m === "edit") {
          document.getElementById("vt-edit").classList.add("active");
          ed.style.display = "block";
          pv.style.display = "none";
        } else if (m === "split") {
          document.getElementById("vt-split").classList.add("active");
          wr.id = "split-mode";
          ed.style.display = "block";
          pv.style.display = "block";
        } else {
          document.getElementById("vt-prev").classList.add("active");
          ed.style.display = "none";
          pv.style.display = "block";
          updPrev();
        }
      }

      // FORMATTING
      function fmt(cmd) {
        const ta = document.getElementById("editor");
        ta.focus();
        const s = ta.selectionStart,
          e = ta.selectionEnd,
          sel = ta.value.slice(s, e);
        const m = { bold: ["**", "**"], italic: ["*", "*"] };
        const [o, c] = m[cmd];
        ta.setRangeText(o + sel + c, s, e, "select");
        onEditorInput();
      }
      function fmtMd(o, c) {
        const ta = document.getElementById("editor");
        ta.focus();
        const s = ta.selectionStart,
          e = ta.selectionEnd,
          sel = ta.value.slice(s, e);
        ta.setRangeText(o + sel + c, s, e, "end");
        if (!sel) {
          ta.selectionStart = s + o.length;
          ta.selectionEnd = s + o.length;
        }
        onEditorInput();
      }
      function fmtLine(pfx) {
        const ta = document.getElementById("editor");
        ta.focus();
        const s = ta.selectionStart,
          val = ta.value;
        const ls = val.lastIndexOf("\n", s - 1) + 1,
          le = val.indexOf("\n", s),
          end = le === -1 ? val.length : le;
        const line = val.slice(ls, end);
        ta.setRangeText(
          line.startsWith(pfx) ? line.slice(pfx.length) : pfx + line,
          ls,
          end,
          "end"
        );
        onEditorInput();
      }
      function insertLink() {
        const ta = document.getElementById("editor");
        ta.focus();
        const s = ta.selectionStart,
          e = ta.selectionEnd,
          sel = ta.value.slice(s, e) || "link text";
        ta.setRangeText(`[${sel}](url)`, s, e, "end");
        onEditorInput();
      }
      function insertHr() {
        const ta = document.getElementById("editor");
        ta.focus();
        const s = ta.selectionStart;
        ta.setRangeText("\n\n---\n\n", s, s, "end");
        onEditorInput();
      }
      function toggleMdHelp() {
        document.getElementById("md-help").classList.toggle("open");
      }

      // KEYBOARD
      document.addEventListener("keydown", (e) => {
        if ((e.ctrlKey || e.metaKey) && e.key === "b") {
          e.preventDefault();
          fmt("bold");
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "i") {
          e.preventDefault();
          fmt("italic");
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "n") {
          e.preventDefault();
          newNote();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "k") {
          e.preventDefault();
          document.getElementById("search").focus();
        }
        if ((e.ctrlKey || e.metaKey) && e.key === "z" && drawOpen) {
          e.preventDefault();
          undoDraw();
        }
        if (
          (e.ctrlKey || e.metaKey) &&
          e.shiftKey &&
          e.key === "Z" &&
          drawOpen
        ) {
          e.preventDefault();
          redoDraw();
        }
      });

      function x(s) {
        return String(s || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      // ══════════════════════════════════════════
      //  DRAWING ENGINE
      // ══════════════════════════════════════════
      let canvas, ctx;
      let isDrawing = false;
      let tool = "pen";
      let bColor = "#2c1810",
        bSize = 3,
        bOpacity = 1;
      let undoStack = [],
        redoStack = [];
      let lastX = 0,
        lastY = 0;

      function initDraw() {
        canvas = document.getElementById("draw-canvas");
        ctx = canvas.getContext("2d");
        resizeCv();

        // Mouse
        canvas.addEventListener("mousedown", (e) => {
          startD(getP(e));
        });
        canvas.addEventListener("mousemove", (e) => {
          if (isDrawing) drawD(getP(e));
        });
        canvas.addEventListener("mouseup", endD);
        canvas.addEventListener("mouseleave", endD);

        // Touch
        canvas.addEventListener(
          "touchstart",
          (e) => {
            e.preventDefault();
            startD(getP(e.touches[0]));
          },
          { passive: false }
        );
        canvas.addEventListener(
          "touchmove",
          (e) => {
            e.preventDefault();
            if (isDrawing) drawD(getP(e.touches[0]));
          },
          { passive: false }
        );
        canvas.addEventListener(
          "touchend",
          (e) => {
            e.preventDefault();
            endD();
          },
          { passive: false }
        );
      }

      function resizeCv() {
        if (!canvas) return;
        const parts = document.getElementById("canvas-sz").value.split(",");
        const W = +parts[0],
          H = +parts[1];
        let snap = null;
        if (ctx) snap = ctx.getImageData(0, 0, canvas.width, canvas.height);
        canvas.width = W;
        canvas.height = H;
        canvas.style.width = W + "px";
        canvas.style.height = H + "px";
        ctx = canvas.getContext("2d");
        fillBg();
        if (snap && snap.width > 0) ctx.putImageData(snap, 0, 0);
      }

      function fillBg() {
        ctx.save();
        ctx.globalCompositeOperation = "source-over";
        ctx.globalAlpha = 1;
        ctx.fillStyle = "#faf7f2";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.restore();
      }

      function getP(e) {
        const r = canvas.getBoundingClientRect();
        const sx = canvas.width / r.width,
          sy = canvas.height / r.height;
        return { x: (e.clientX - r.left) * sx, y: (e.clientY - r.top) * sy };
      }

      function saveSnap() {
        undoStack.push(canvas.toDataURL());
        if (undoStack.length > 40) undoStack.shift();
        redoStack = [];
        updUndoCt();
      }

      function startD(p) {
        isDrawing = true;
        saveSnap();
        lastX = p.x;
        lastY = p.y;
        applyStyle();
        ctx.beginPath();
        ctx.arc(p.x, p.y, effSize() / 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(p.x, p.y);
      }

      function drawD(p) {
        applyStyle();
        ctx.beginPath();
        ctx.moveTo(lastX, lastY);
        ctx.lineTo(p.x, p.y);
        ctx.stroke();
        lastX = p.x;
        lastY = p.y;
      }

      function endD() {
        isDrawing = false;
        if (ctx) ctx.beginPath();
      }

      function applyStyle() {
        if (tool === "er") {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
          ctx.fillStyle = "rgba(0,0,0,1)";
          ctx.lineWidth = bSize * 5;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.globalAlpha = 1;
        } else if (tool === "hl") {
          ctx.globalCompositeOperation = "multiply";
          ctx.strokeStyle = bColor;
          ctx.fillStyle = bColor;
          ctx.lineWidth = bSize * 7;
          ctx.lineCap = "square";
          ctx.lineJoin = "round";
          ctx.globalAlpha = Math.min(bOpacity, 0.4);
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = bColor;
          ctx.fillStyle = bColor;
          ctx.lineWidth = bSize;
          ctx.lineCap = "round";
          ctx.lineJoin = "round";
          ctx.globalAlpha = bOpacity;
        }
      }

      function effSize() {
        return tool === "er" ? bSize * 5 : tool === "hl" ? bSize * 7 : bSize;
      }

      function setTool(t) {
        tool = t;
        document
          .querySelectorAll(".dtool")
          .forEach((b) => b.classList.remove("active"));
        document.getElementById("dt-" + t).classList.add("active");
        const cw = document.getElementById("canvas-wrap");
        cw.className =
          t === "er" ? "cur-er" : t === "hl" ? "cur-hl" : "cur-pen";
      }

      function pickSw(el) {
        bColor = el.dataset.c;
        document
          .querySelectorAll(".sw")
          .forEach((s) => s.classList.remove("active"));
        el.classList.add("active");
        document.getElementById("color-picker").value = bColor;
        if (tool === "er") setTool("pen");
      }

      function pickCustom(v) {
        bColor = v;
        document
          .querySelectorAll(".sw")
          .forEach((s) => s.classList.remove("active"));
        if (tool === "er") setTool("pen");
      }

      function onSz() {
        bSize = +document.getElementById("brush-size").value;
        const sz = Math.min(Math.max(bSize, 2), 22);
        const d = document.getElementById("size-dot");
        d.style.width = sz + "px";
        d.style.height = sz + "px";
      }

      function onOp() {
        const v = +document.getElementById("brush-op").value;
        bOpacity = v / 100;
        document.getElementById("op-val").textContent = v + "%";
      }

      function undoDraw() {
        if (!undoStack.length) return;
        redoStack.push(canvas.toDataURL());
        const img = new Image();
        img.onload = () => {
          fillBg();
          ctx.drawImage(img, 0, 0);
        };
        img.src = undoStack.pop();
        updUndoCt();
      }

      function redoDraw() {
        if (!redoStack.length) return;
        undoStack.push(canvas.toDataURL());
        const img = new Image();
        img.onload = () => {
          fillBg();
          ctx.drawImage(img, 0, 0);
        };
        img.src = redoStack.pop();
        updUndoCt();
      }

      function updUndoCt() {
        document.getElementById("undo-ct").textContent = undoStack.length
          ? `(${undoStack.length} steps)`
          : "";
      }

      function clearCanvas() {
        if (!confirm("Clear the canvas?")) return;
        saveSnap();
        fillBg();
      }

      function dlDraw() {
        if (!canvas) return;
        const a = document.createElement("a");
        a.download = "drawing-" + Date.now() + ".png";
        a.href = canvas.toDataURL("image/png");
        a.click();
      }

      function insertDrawing() {
        if (!canvas || !S.aN) return;
        const url = canvas.toDataURL("image/png");
        const note = S.notes.find((n) => n.id === S.aN);
        if (!note) return;
        const md = "\n\n![My Drawing](" + url + ")\n\n";
        const ta = document.getElementById("editor");
        const pos = ta.selectionStart;
        ta.setRangeText(md, pos, pos, "end");
        note.body = ta.value;
        note.upd = Date.now();
        scheduleSv();
        updPrev();
        updCounts();
        rNotes();
        toggleDraw();
      }

      function toggleDraw() {
        if (!S.aN) {
          if (S.notebooks.length) {
            newNote();
          }
          setTimeout(() => {
            openDrawPanel();
          }, 100);
          return;
        }
        openDrawPanel();
      }

      function openDrawPanel() {
        drawOpen = !drawOpen;
        const panel = document.getElementById("draw-panel");
        const btn = document.getElementById("draw-btn");
        panel.classList.toggle("open", drawOpen);
        btn.classList.toggle("on", drawOpen);
        if (drawOpen && !canvas) initDraw();
      }

      // ── BOOT ──
      load();
      const fn = S.notes.find((n) => n.nbId === S.aNB);
      if (fn && !S.aN) S.aN = fn.id;
      render();
    </script>
  </body>
</html>
